<body>
<div style="color:red;font-size:40px;">
 <script language="JavaScript">
var x=prompt("podaj liczbę ","");
 var a_ski=parseFloat(x);
 document.write("czytana liczba to "+a_ski+"<br>");
 if(a_ski%2==0){
document.write ("<p style=\"font-size: 40px; color: black;\">liczba jest parzysta<br></p>");
}
else{
document.write ("<p style=\"font-size: 40px; color: black;\">liczba jest nieparzysta<br></p>");
}
 </script>
</div>
</body>
